<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phonics Dictionary - Learn to Read with Sound Patterns</title>
    <meta name="description" content="Educational phonics dictionary for children learning to read - comprehensive phonics patterns and word breakdowns">
    <meta name="keywords" content="Phonics, Reading, Education, Learning, Children, Literacy, Sound Patterns, Digraphs, Magic E">
    <meta name="author" content="Phonics Dictionary Team">
    
    <!-- Ext JS Neptune Theme CSS -->
    <link rel="stylesheet" type="text/css" href="./build/build/resources/ext-theme-neptune-all.css" />
    
    <!-- Custom Phonics Styles -->
    <link rel="stylesheet" type="text/css" href="./phonics-styles.css" />
    
    <!-- Ext JS Core Library -->
    <script src="./build/ext-all.js" type="text/javascript" charset="utf-8"></script>
    
    <!-- Phonics System Modules (Load order is important!) -->
    <!-- 1. Global Configuration -->
    <script src="./js/config-phonics.js" type="text/javascript" charset="utf-8"></script>
    
    <!-- 2. Phonics Data -->
    <script src="./js/data/PhonicsData.js" type="text/javascript" charset="utf-8"></script>
    
    <!-- 3. Data Stores -->
    <script src="./js/stores/PhonicsStores.js" type="text/javascript" charset="utf-8"></script>
    
    <!-- 4. Main Application -->
    <script src="./phonics-system.js" type="text/javascript" charset="utf-8"></script>
    
    <style>
        /* Loading Screen */
        #loading-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.3s;
        }
        
        #loading-mask .loading-indicator {
            color: #ffffff;
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        
        #loading-mask .loading-logo {
            font-size: 72px;
            color: #ffffff;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        #loading-mask .loading-text {
            margin-top: 12px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        /* Pre-initialization body style */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-mask">
        <div class="loading-indicator">
            <div class="loading-logo">📚</div>
            <div class="loading-text">Initializing Phonics Dictionary...</div>
        </div>
    </div>
    
    <!--
    ============================================================
    Phonics Dictionary v1.0.0
    ============================================================
    Purpose: Educational Reading Tool
    Target: Early Years Education (Reception - Year 3)
    
    Key Features:
    - Comprehensive phonics patterns library
    - Word phonetic breakdown analyzer
    - Phase-based learning path
    - Visual color-coded sound patterns
    - 3-phase curriculum structure
    
    Technology Stack:
    - Ext JS 5.x (Neptune Theme)
    - HTML5 / CSS3
    - JavaScript ES5
    ============================================================
    -->
</body>
</html>
